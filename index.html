<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oferta Builder</title>
    
    <link rel="stylesheet" href="css/extractor.css">
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>

    <div class="card">
        <h1>Oferta Builder (Modular)</h1>
        <p>Sube un archivo de oferta académica (Excel) y conviértelo a JSON al instante.</p>
        
        <div class="form-group">
            <label for="carreraSelect">Selecciona la Carrera (Adaptador)</label>
            <select id="carreraSelect">
                <option value="SISTEMAS">Ingeniería de Sistemas</option>
                <option value="ALIMENTOS">Ingeniería de Alimentos</option>
            </select>
        </div>

        <div class="form-group">
            <label for="fileInput">Sube el archivo Excel (.xlsx)</label>
            <input type="file" id="fileInput" accept=".xlsx, .xls">
        </div>

        <button id="btnProcesar">Generar JSON</button>
        
        <div id="actionButtons" style="display: none; margin-top: 1rem; gap: 1rem;">
            <button id="btnVerResultados" style="background: #f59e0b; flex: 1;">Ver Resultados</button>
            <button id="btnDescargar" style="background: #10b981; flex: 1; margin-top: 0;">⬇️ Descargar JSON</button>
        </div>

        <h3 style="margin-top: 2rem;">Previsualización Cruda:</h3>
        <pre id="jsonOutput">Esperando archivo...</pre>
    </div>

    <div id="resultadosModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Tabla de Oferta Extraída</h2>
                <span class="close-btn" id="cerrarModal">&times;</span>
            </div>
            <div id="resultadosTablaContenedor" class="modal-body">
                </div>
        </div>
    </div>

    <script src="js/extractor-utils.js"></script>
    <script src="js/adaptadores/adaptador_sistemas.js"></script>
    <script src="js/adaptadores/adaptador_alimentos.js"></script>
    <script src="js/extractor-core.js"></script>

</body>
</html>
