<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oferta Builder - Universal</title>
    
    <link rel="stylesheet" href="css/extractor.css">
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>

    <div class="card">
        <h1>Oferta Builder (Modular)</h1>
        <p>Sube un archivo de oferta académica (Excel) y conviértelo a JSON al instante.</p>
        
        <div class="form-group">
            <label for="carreraSelect">1. Selecciona la Carrera (Adaptador)</label>
            <select id="carreraSelect">
                <option value="SISTEMAS">Ingeniería de Sistemas</option>
                <option value="ALIMENTOS">Ingeniería de Alimentos</option>
            </select>
        </div>

        <div class="form-group">
            <label for="fileInput">2. Sube el archivo Excel (.xlsx)</label>
            <input type="file" id="fileInput" accept=".xlsx, .xls">
        </div>

        <button id="btnProcesar">Generar JSON</button>
        <button id="btnDescargar" style="display: none;">Descargar JSON Oficial</button>

        <h3 style="margin-top: 2rem;">Previsualización de Datos:</h3>
        <pre id="jsonOutput">Esperando archivo...</pre>
    </div>

    <script src="js/extractor-utils.js"></script>
    
    <script src="js/adaptadores/adaptador_sistemas.js"></script>

    <script src="js/adaptadores/adaptador_alimentos.js"></script>
    
    <script src="js/extractor-core.js"></script>

</body>
</html>
